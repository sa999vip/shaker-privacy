<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- الخلفية الدائرية -->
  <circle cx="50" cy="50" r="40" fill="#E8F5E9" />
  
  <!-- الحامل الخشبي السفلي للمصحف (الكرسي) -->
