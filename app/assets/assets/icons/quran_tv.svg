<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- الخلفية الدائرية -->
  <circle cx="50" cy="50" r="40" fill="#FFF3E0" />
  
  <!-- هيكل الشاشة التلفزيونية الخارجي -->
  <rect x="28" y="32" width="44" height="30" rx="3" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2.5" />
  
  <!-- حامل الشاشة السفلي -->
  <polygon points="44,62 56,62 58,69 42,69" fill="#BDC3C7" stroke="#2C3E50" stroke-width="2" stroke-linejoin="round" />
  
  <!-- مشهد الكعبة المشرفة مبسط جداً داخل الشاشة -->
  <rect x="42" y="40" width="16" height="16" fill="#2C3E50" rx="1" />
  <!-- الحزام الذهبي للكعبة -->
  <line x1="42" y1="44" x2="58" y2="44" stroke="#F1C40F" stroke-width="1.5" />
  
  <!-- رمز البث المباشر (نقطة Live مصغرة في زاوية الشاشة) -->
  <circle cx="34" cy="38" r="1.5" fill="#E74C3C" />
</svg>
