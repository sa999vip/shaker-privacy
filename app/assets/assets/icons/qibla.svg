<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- الخلفية الدائرية -->
  <circle cx="50" cy="50" r="40" fill="#F4EAE1" />
  
  <!-- هيكل البوصلة الخارجي -->
  <circle cx="50" cy="50" r="28" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2.5" />
  
  <!-- درجات البوصلة الداخلية الخلفية -->
  <circle cx="50" cy="50" r="24" fill="none" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="2,2" />
  
  <!-- إبرة البوصلة (شمال / قبلة) -->
  <polygon points="50,26 55,50 50,46" fill="#E74C3C" stroke="#2C3E50" stroke-width="2" stroke-linejoin="round" />
  <polygon points="50,74 55,50 50,46" fill="#34495E" stroke="#2C3E50" stroke-width="2" stroke-linejoin="round" />
  
  <!-- النقطة المركزية المرتكزة عليها الإبرة -->
  <circle cx="50" cy="50" r="3" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2" />
</svg>
