  <line x1="45" y1="68" x2="42" y2="76" stroke="#2C3E50" stroke-width="2" />
  <line x1="55" y1="68" x2="58" y2="76" stroke="#2C3E50" stroke-width="2" />
  
  <!-- صفحات كتاب المصحف المفتوح -->
  <!-- الصفحة اليسرى -->
  <path d="M 50,62 C 44,60 32,62 30,54 L 34,36 C 36,44 46,42 50,45 Z" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2" stroke-linejoin="round" />
  <!-- الصفحة اليمنى -->
  <path d="M 50,62 C 56,60 68,62 70,54 L 66,36 C 64,44 54,42 50,45 Z" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2" stroke-linejoin="round" />
  
  <!-- خطوط ترمز للآيات المكتوبة داخل الصفحات -->
  <line x1="36" y1="46" x2="44" y2="48" stroke="#BDC3C7" stroke-width="1.5" stroke-linecap="round" />
  <line x1="36" y1="52" x2="45" y2="54" stroke="#BDC3C7" stroke-width="1.5" stroke-linecap="round" />
  <line x1="64" y1="46" x2="56" y2="48" stroke="#BDC3C7" stroke-width="1.5" stroke-linecap="round" />
  <line x1="64" y1="52" x2="55" y2="54" stroke="#BDC3C7" stroke-width="1.5" stroke-linecap="round" />
</svg>
